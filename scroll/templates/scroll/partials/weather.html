<div class="relative overflow-hidden p-8 shadow-lg max-w-[500px] rounded transition-all duration-700
     {% if temp != '--' and temp > 25 %} 
        bg-orange-100/40 shadow-[0_0_20px_-5px_rgba(251,146,60,0.1)] 
     {% elif 'Rain' in condition or 'Drizzle' in condition or 'Showers' in condition %} 
        bg-indigo-100/30 shadow-[0_0_20px_-5px_rgba(129,140,248,0.1)]
     {% elif temp != '--' and temp < 8 %} 
        bg-blue-100/30
     {% else %} 
        bg-zinc-50 
     {% endif %}">

    <div class="absolute inset-0 opacity-[0.08] pointer-events-none"
        style="background-image: radial-gradient(#000 0.5px, transparent 0.5px); background-size: 8px 8px;">
    </div>

    <div class="relative z-10">
        <div class="flex justify-between items-start mb-4">
            <p class="text-[9px] font-bold uppercase tracking-[0.2em]
               {% if temp != '--' and temp > 25 %} text-orange-600/70 
               {% elif 'Rain' in condition %} text-indigo-600/70 
               {% else %} text-zinc-400 {% endif %}">
                {% if is_local %}Local Weather{% else %}Banbury Weather{% endif %}
            </p>

            <div class="flex items-center gap-1.5">
                <div class="h-3 w-3 rounded-full animate-pulse
                    {% if temp != '--' and temp > 25 %} bg-orange-500 
                    {% elif 'Rain' in condition %} bg-indigo-500 
                    {% else %} bg-zinc-400 {% endif %}">
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <div class="flex flex-col">
                <span class="text-4xl font-black text-black leading-none tracking-tighter">{{ temp }}°C</span>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="text-black font-bold text-[11px] uppercase tracking-widest">{{ condition }}</span>
                <span class="text-[10px] text-zinc-400 mt-1">
                    {% if temp != '--' and temp > 25 %}Warm{% endif %}
                </span>
            </div>
        </div>
    </div>
</div>
