{% extends "scroll/base_entrance.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 bg-white border border-zinc-200 rounded-2xl shadow-sm">
    <h2 class="text-2xl font-black tracking-tighter mb-4">Reset Password.</h2>
    <p class="text-sm text-zinc-400 mb-8 leading-relaxed">Enter your email below and we'll send you a link to get back
        into your account.</p>

    <form method="post" action="{% url 'account_reset_password' %}" class="space-y-6">
        {% csrf_token %}
        <div class="space-y-1">
            <label class="block text-xs font-bold text-zinc-700">Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required
                class="w-full bg-zinc-50 border border-zinc-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-zinc-900 transition">
        </div>

        <button type="submit"
            class="w-full py-3 bg-zinc-900 text-white font-bold rounded-sm hover:bg-black transition shadow-lg shadow-zinc-100">
            Send Reset Link →
        </button>
    </form>
</div>
{% endblock %}
