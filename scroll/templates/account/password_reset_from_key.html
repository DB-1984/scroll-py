{% extends "scroll/base_entrance.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 border border-zinc-200 rounded-2xl">
    <h2 class="text-2xl font-black mb-6">New Password.</h2>

    <form method="post" action="{{ action_url }}" class="space-y-6">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full py-3 bg-zinc-900 text-white font-bold rounded-sm">
            Change Password
        </button>
    </form>
</div>
{% endblock %}
