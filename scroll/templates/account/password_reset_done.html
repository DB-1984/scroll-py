{% extends "scroll/base_entrance.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-32 text-center">
    <div class="w-16 h-16 bg-zinc-50 rounded-full flex items-center justify-center border border-zinc-100 mx-auto mb-6">
        <span class="text-2xl">✉️</span>
    </div>
    <h2 class="text-2xl font-black tracking-tighter mb-2">Check your inbox.</h2>
    <p class="text-sm text-zinc-400 mb-8">We've sent a password reset link to your email. If it doesn't arrive soon,
        check your spam folder.</p>

    <a href="{% url 'account_login' %}" class="text-xs font-bold text-zinc-900 hover:underline">Return to Sign In</a>
</div>
{% endblock %}
