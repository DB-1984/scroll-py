{% extends "scroll/base_entrance.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-32 text-center">
    <div
        class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center border border-emerald-100 mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-8 h-8 text-emerald-600">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
    </div>

    <h2 class="text-2xl font-black tracking-tighter mb-2 text-zinc-900">Password Updated.</h2>
    <p class="text-sm text-zinc-400 mb-10 leading-relaxed">Your new password is set. You can now securely access your
        Scroll again.</p>

    <a href="{% url 'account_login' %}"
        class="inline-block px-8 py-3 bg-zinc-900 text-white text-xs font-bold rounded-sm hover:bg-black transition shadow-lg shadow-zinc-200 uppercase tracking-widest">
        Sign In →
    </a>
</div>
{% endblock %}
